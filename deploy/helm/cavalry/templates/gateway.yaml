apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cavalry.fullname" . }}-gateway
  labels:
    {{- include "cavalry.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cavalry.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "cavalry.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: {{ include "cavalry.image" (dict "root" . "component" .Values.gateway) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3001
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            periodSeconds: 30
          env:
            - name: CAVALRY_GATEWAY_PORT
              value: "3001"
            {{- include "cavalry.envFromSecret" . | nindent 12 }}
            {{- include "cavalry.envFromConfig" . | nindent 12 }}
            {{- with .Values.gateway.extraEnv }}
            {{- range $k, $v := . }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cavalry.fullname" . }}-gateway
  labels:
    {{- include "cavalry.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "cavalry.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: gateway
