{{- if .Values.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cavalry.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "cavalry.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrationJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "cavalry.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "cavalry.image" (dict "root" . "component" .Values.web) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["pnpm", "--filter", "@cavalry/database", "db:migrate"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cavalry.secretName" . }}
                  key: DATABASE_URL
          resources:
            {{- toYaml .Values.migrationJob.resources | nindent 12 }}
{{- end }}
