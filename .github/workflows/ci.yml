name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://cavalry:cavalry@localhost:5432/cavalry_dev
      BETTER_AUTH_SECRET: ci-secret-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3000
      CAVALRY_WEB_URL: http://localhost:3000
      CAVALRY_GATEWAY_URL: http://localhost:3001
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cavalry
          POSTGRES_PASSWORD: cavalry
          POSTGRES_DB: cavalry_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cavalry"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: cp .env.example .env

      - run: pnpm db:migrate

      - run: pnpm turbo lint typecheck test build

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    env:
      DATABASE_URL: postgres://cavalry:cavalry@localhost:5432/cavalry_e2e
      BETTER_AUTH_SECRET: ci-secret-at-least-32-characters-long
      CAVALRY_ENV: test
      CAVALRY_LOG_LEVEL: warn
      CAVALRY_STORAGE_PROVIDER: local
      CAVALRY_STORAGE_LOCAL_DIR: ./apps/web-e2e/.cavalry-e2e-storage
      CI: 'true'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cavalry
          POSTGRES_PASSWORD: cavalry
          POSTGRES_DB: cavalry_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cavalry"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: cp .env.example .env

      - run: pnpm --filter @cavalry/web-e2e e2e:install

      - run: pnpm e2e

      - name: Upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web-e2e/playwright-report
          retention-days: 7

      - name: Upload playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web-e2e/test-results
          retention-days: 7
