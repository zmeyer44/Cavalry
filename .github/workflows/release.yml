name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  images:
    name: Build and publish images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        component:
          - web
          - gateway
          - worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ matrix.component }}
          echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  chart:
    name: Package Helm chart
    runs-on: ubuntu-latest
    needs: images
    outputs:
      chart-file: ${{ steps.package.outputs.chart-file }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set chart version to release tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/cavalry/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/cavalry/Chart.yaml

      - name: Package chart
        id: package
        run: |
          helm package deploy/helm/cavalry --destination dist/
          FILE=$(ls dist/cavalry-*.tgz | head -1)
          echo "chart-file=${FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/cavalry-*.tgz

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [images, chart]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Helm chart
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/cavalry-*.tgz
          body: |
            ## Cavalry ${{ github.ref_name }}

            Images (multi-arch amd64/arm64):
            - `ghcr.io/${{ github.repository_owner }}/web:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/gateway:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/worker:${{ github.ref_name }}`

            Helm chart attached below.

            See [docs.cavalry.sh](https://docs.cavalry.sh) for deployment instructions.
